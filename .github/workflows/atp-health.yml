name: ATP1 Health Check

on:
  workflow_dispatch:  # Manual run button

jobs:
  atp1-health:
    runs-on: ubuntu-latest

    env:
      TENANCY_OCID: ${{ secrets.TENANCY_OCID }}
      ATP1_ADMIN_USER: ${{ secrets.ATP1_ADMIN_USER }}
      ATP1_ADMIN_PASS: ${{ secrets.ATP1_ADMIN_PASS }}
      ATP1_WALLET_USER: ${{ secrets.ATP1_WALLET_USER }}
      ATP1_WALLET_PASS: ${{ secrets.ATP1_WALLET_PASS }}
      ATP1_WALLET_URL:  ${{ secrets.ATP1_WALLET_URL }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install OCI CLI
      run: |
        python -m pip install --upgrade pip
        pip install oci-cli

    - name: Download ATP1 wallet
      run: |
        mkdir -p /tmp/wallet_atp1
        curl -u "${ATP1_WALLET_USER}:${ATP1_WALLET_PASS}" \
             -X POST \
             -o /tmp/wallet_atp1/wallet_atp1.zip \
             "${ATP1_WALLET_URL}"
        unzip -o /tmp/wallet_atp1/wallet_atp1.zip -d /tmp/wallet_atp1

    - name: Install Oracle SQLcl
      uses: cpruvost/setup-sqlcl@v1.0.0

    - name: Check ATP1 database status
      env:
        TNS_ADMIN: /tmp/wallet_atp1
      run: |
        ./sqlcl/bin/sql -V

        ./sqlcl/bin/sql "${ATP1_ADMIN_USER}/${ATP1_ADMIN_PASS}@DBREATP1_high" << 'EOF'
        set heading off feedback off pages 0
        select name || ' ' || open_mode from v$database;
        exit;
        EOF
