name: ATP1 Health Check (DBRE)

on:
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    env:
      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      TENANCY_OCID: ${{ secrets.TENANCY_OCID }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OCI CLI
        run: |
          python3 -m pip install --upgrade pip
          pip install oci-cli

      - name: Setup OCI Config
        run: |
          mkdir -p ~/.oci

          # Write private key
          printf '%s\n' "${OCI_PRIVATE_KEY}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          # Write config using printf — avoids heredoc indentation bug
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=ap-hyderabad-1\nkey_file=/home/runner/.oci/oci_api_key.pem\n' \
            "${OCI_USER_OCID}" \
            "${OCI_FINGERPRINT}" \
            "${TENANCY_OCID}" > ~/.oci/config
          chmod 600 ~/.oci/config

          echo "✅ OCI Config ready"
          oci iam region list --raw-output | jq '.[0].name'

      - name: Generate ATP1 Wallet
        run: |
          mkdir -p /tmp/wallet
          oci db autonomous-database generate-wallet \
            --autonomous-database-id "${{ secrets.ATP1_DB_OCID }}" \
            --password "${{ secrets.ATP1_WALLET_PASS }}" \
            --file /tmp/wallet.zip
          unzip /tmp/wallet.zip -d /tmp/wallet
          echo "✅ Wallet extracted: $(ls /tmp/wallet/)"

      - name: Setup SQLcl
        uses: cpruvost/setup-sqlcl@v1

      - name: Test ATP1 Connection
        env:
          TNS_ADMIN: /tmp/wallet
        run: |
          sqlcl/bin/sql ${{ secrets.ATP1_ADMIN_USER }}/${{ secrets.ATP1_ADMIN_PASS }}@DBREATP1_high << 'EOF'
          set pagesize 1 feedback off
          SELECT '✅ ' || name || ' (' || open_mode || ')' FROM v$database;
          SELECT 'CPU: OK' FROM dual;
          exit;
          EOF

      - name: Summary
        run: |
          echo "🎉 DBRE ATP1 Health Check: PASSED!"
          echo "::notice::ATP DBREATP1 healthy and accessible"
