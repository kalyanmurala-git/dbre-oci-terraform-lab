name: ATP1 Health Check

on:
  workflow_dispatch:

jobs:
  atp1-health:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── Step 1: Install OCI CLI ──────────────────────────────────────────────
    - name: Install OCI CLI
      run: |
        python -m pip install --upgrade pip
        pip install oci-cli

    # ── Step 2: Configure OCI CLI ────────────────────────────────────────────
    - name: Configure OCI CLI
      env:
        OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
        OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
        TENANCY_OCID: ${{ secrets.TENANCY_OCID }}
        OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        SUPPRESS_LABEL_WARNING: "True"
      run: |
        mkdir -p ~/.oci

        # Write private key first
        printf '%s\n' "${OCI_PRIVATE_KEY}" > ~/.oci/private_key.pem
        chmod 600 ~/.oci/private_key.pem

        # Write config using printf (avoids heredoc indentation issues)
        printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=ap-hyderabad-1\nkey_file=/home/runner/.oci/private_key.pem\n' \
          "${OCI_USER_OCID}" "${OCI_FINGERPRINT}" "${TENANCY_OCID}" > ~/.oci/config
        chmod 600 ~/.oci/config

        # Verify config looks correct (mask sensitive parts)
        echo "--- Config check ---"
        grep -E "^(region|fingerprint|key_file)" ~/.oci/config
        echo "user OCID set: $(grep -c '^user=ocid' ~/.oci/config) line(s)"
        echo "tenancy OCID set: $(grep -c '^tenancy=ocid' ~/.oci/config) line(s)"

        # Test connectivity
        oci iam region list --output table

    # ── Step 3: Download ATP1 Wallet ─────────────────────────────────────────
    - name: Download ATP1 wallet
      env:
        OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
      run: |
        mkdir -p /tmp/wallet_atp1
        oci db autonomous-database generate-wallet \
          --autonomous-database-id ${{ secrets.ATP1_DB_OCID }} \
          --password "${{ secrets.ATP1_WALLET_PASS }}" \
          --file /tmp/wallet_atp1/wallet_atp1.zip \
          --generate-type ALL
        unzip -o /tmp/wallet_atp1/wallet_atp1.zip -d /tmp/wallet_atp1
        echo "Wallet contents:"
        ls -la /tmp/wallet_atp1/

    # ── Step 4: Install SQLcl ─────────────────────────────────────────────────
    - name: Install Oracle SQLcl
      uses: cpruvost/setup-sqlcl@v1.0.0

    # ── Step 5: Health Check ──────────────────────────────────────────────────
    - name: Check ATP1 database status
      env:
        TNS_ADMIN: /tmp/wallet_atp1
        OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
      run: |
        ./sqlcl/bin/sql -V
        ./sqlcl/bin/sql "${{ secrets.ATP1_ADMIN_USER }}/${{ secrets.ATP1_ADMIN_PASS }}@DBREATP1_high" << 'EOF'
        set heading off feedback off pages 0
        select name || ' - ' || open_mode || ' - STATUS: OK' from v$database;
        exit;
        EOF
